<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<!-- Skalierung sperren → app-artiges Verhalten, kein Auto-Zoom -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- iOS: Vollbild beim Öffnen vom Home-Bildschirm -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rechnen">
<meta name="theme-color" content="#FFFFFF">
<title>Rechentrainer</title>
<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100vh;
  background: #FFFFFF;
  color: #000000;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;            /* kein Doppeltipp-Zoom */
}

/* Statistik: Schrift 20px, erste Zeile bei x=10, y=30 vom linken oberen Rand (V1: 20px nach unten) */
#stats {
  position: absolute;
  top: 30px;
  left: 10px;
  font-size: 20px;
  line-height: 1.4;
  z-index: 10;
}

/* Hauptbereich: Aufgabe + Eingabe vertikal mittig */
#main {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 30px;
  padding: 20px;
}

/* Aufgabendarstellung */
#task {
  font-family: "Menlo", "Courier New", monospace;
  font-size: 48px;
  line-height: 1.2;
}
#task.stacked      { display: inline-block; }   /* Schrumpft auf Inhaltsbreite */
#task .line        { white-space: pre; }        /* Führende Spaces erhalten */
#task .divider     { border-top: 2px solid #000000; margin-top: 6px; }

/* Eingabezeile */
#entry {
  display: flex;
  gap: 12px;
  align-items: center;
}

#answer {
  width: 140px;
  height: 56px;
  font-size: 28px;
  text-align: center;
  border: 1px solid #000000;
  border-radius: 6px;
  background: #FFFFFF;
  color: #000000;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  padding: 0;
}

#check-btn {
  width: 140px;
  height: 56px;
  font-size: 16px;
  font-weight: 600;
  background: #0000FF;            /* #000FF (5-stellig) als Pures Blau interpretiert */
  color: #FFFFFF;
  border: none;
  border-radius: 6px;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
  cursor: pointer;
}
#check-btn.correct { background: #2ECC40; }   /* Grün bei Richtig */
#check-btn.wrong   { background: #FF4136; }   /* Rot  bei Falsch  */

/* Priorisierungs-Buttons (Vorrangig +, −, ×) */
#priority {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.prio-btn {
  padding: 8px 12px;
  font-size: 14px;
  background: #FFFFFF;
  color: #000000;
  border: 1px solid #000000;
  border-radius: 6px;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
  cursor: pointer;
}
.prio-btn.active {        /* gewählter Button bleibt sichtbar gedrückt */
  background: #000000;
  color: #FFFFFF;
}

/* Reset-Button (rechte obere Ecke) – setzt Statistik auf 0 */
#reset-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 6px 10px;
  font-size: 14px;
  background: #FFFFFF;
  color: #000000;
  border: 1px solid #000000;
  border-radius: 6px;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
  cursor: pointer;
  z-index: 10;
}
</style>
</head>
<body>

<!-- Statistik oben links -->
<div id="stats">
  <div>Richtig: <span id="s-correct">0</span></div>
  <div>Falsch: <span id="s-wrong">0</span></div>
  <div>Quote: <span id="s-rate">0,0</span> %</div>
</div>

<!-- Reset-Button oben rechts -->
<button id="reset-btn" tabindex="-1">↺ Reset</button>

<!-- Aufgabe + Eingabe -->
<div id="main">
  <div id="priority">
    <button class="prio-btn" data-type="add" tabindex="-1">Vorrangig +</button>
    <button class="prio-btn" data-type="sub" tabindex="-1">Vorrangig −</button>
    <button class="prio-btn" data-type="mul" tabindex="-1">Vorrangig ×</button>
  </div>
  <div id="task"></div>
  <div id="entry">
    <input id="answer" type="text"
           inputmode="numeric" pattern="[0-9]*"
           enterkeyhint="go"
           autocomplete="off" autocapitalize="off">
    <button id="check-btn" tabindex="-1">Prüfen</button>
  </div>
</div>

<script>
(function () {
  // ---------- Modell ----------
  const TYPES = ['add', 'sub', 'mul'];
  const STORAGE_KEY = 'rechentrainer-v1';
  let current  = null;         // aktuelle Aufgabe
  let correct  = 0;
  let wrong    = 0;
  let priority = null;         // 'add' | 'sub' | 'mul' | null → doppelte Wahrscheinlichkeit
  let locked   = false;        // sperrt Doppeltipps während 2s-Anzeige

  const $task   = document.getElementById('task');
  const $answer = document.getElementById('answer');
  const $btn    = document.getElementById('check-btn');
  const $sc     = document.getElementById('s-correct');
  const $sw     = document.getElementById('s-wrong');
  const $sr     = document.getElementById('s-rate');

  /** Zufallszahl im Intervall [min, max], inklusive */
  function rnd(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  /** Spielstand laden (richtig/falsch/Priorität). Robust gegen Fehler. */
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      correct  = Number.isInteger(d.correct) && d.correct >= 0 ? d.correct : 0;
      wrong    = Number.isInteger(d.wrong)   && d.wrong   >= 0 ? d.wrong   : 0;
      priority = TYPES.includes(d.priority) ? d.priority : null;
    } catch (e) { /* z. B. Private Mode → ignorieren */ }
  }

  /** Spielstand speichern */
  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY,
        JSON.stringify({ correct: correct, wrong: wrong, priority: priority }));
    } catch (e) { /* Speicher voll oder gesperrt → ignorieren */ }
  }

  /** Wählt einen Typ; Priorität verdoppelt seine Wahrscheinlichkeit (Gewicht 2:1:1) */
  function pickType() {
    const w = { add: 1, sub: 1, mul: 1 };
    if (priority && w[priority] !== undefined) w[priority] = 2;
    const total = w.add + w.sub + w.mul;
    let r = Math.random() * total;
    if ((r -= w.add) < 0) return 'add';
    if ((r -= w.sub) < 0) return 'sub';
    return 'mul';
  }

  /** Erzeugt zufällige Aufgabe nach Spezifikation */
  function generate() {
    const t = pickType();

    if (t === 'add') {
      // Summanden 2- bis 3-stellig (10–999), Summe ≤ 1000
      const a = rnd(10, 999);
      const maxB = Math.min(999, 1000 - a);
      if (maxB < 10) return generate();           // ungünstig → neu würfeln
      const b = rnd(10, maxB);
      return { type: t, a: a, b: b, result: a + b };
    }

    if (t === 'sub') {
      // 0–1000, Ergebnis stets > 0
      const a = rnd(2, 1000);
      const b = rnd(1, a - 1);
      return { type: t, a: a, b: b, result: a - b };
    }

    // mul: Faktor1 0–20, Faktor2 0–10
    const a = rnd(0, 20);
    const b = rnd(0, 10);
    return { type: t, a: a, b: b, result: a * b };
  }

  /** Stellt die Aufgabe dar (gestapelt für +/−, hintereinander für ×) */
  function render() {
    if (current.type === 'mul') {
      $task.classList.remove('stacked');
      $task.textContent = current.a + ' × ' + current.b + ' =';
      return;
    }

    // Grundschul-Stapel
    $task.classList.add('stacked');
    const sign  = current.type === 'add' ? '+' : '−';
    const a     = String(current.a);
    const b     = String(current.b);
    const w     = Math.max(a.length, b.length);
    const lineA = a.padStart(w + 2);                  // 2 Leerstellen vor erstem Summand
    const lineB = sign + ' ' + b.padStart(w);         // Operator + Leerstelle + Zahl

    $task.innerHTML = '';
    const dA = document.createElement('div'); dA.className = 'line';    dA.textContent = lineA;
    const dB = document.createElement('div'); dB.className = 'line';    dB.textContent = lineB;
    const dD = document.createElement('div'); dD.className = 'divider';
    $task.appendChild(dA);
    $task.appendChild(dB);
    $task.appendChild(dD);
  }

  /** Aktualisiert Zähler & Quote in der Anzeige */
  function updateStats() {
    $sc.textContent = correct;
    $sw.textContent = wrong;
    const total = correct + wrong;
    const rate  = total > 0 ? (correct / total * 100) : 0;
    $sr.textContent = rate.toFixed(1).replace('.', ',');
  }

  /** Bereitet die nächste Runde vor */
  function nextRound() {
    current = generate();
    render();
    $answer.value   = '';
    $btn.className  = '';
    $btn.textContent = 'Prüfen';
    locked = false;
    $answer.focus();
  }

  /** Antwort prüfen, visualisieren, nach 2s neue Runde */
  function check() {
    if (locked) return;
    const s = $answer.value.trim();
    if (s === '') return;
    const v = parseInt(s, 10);
    if (isNaN(v)) return;

    locked = true;
    if (v === current.result) {
      correct++;
      $btn.className   = 'correct';
      $btn.textContent = 'Richtig';
    } else {
      wrong++;
      $btn.className   = 'wrong';
      $btn.textContent = 'Falsch';
    }
    updateStats();
    saveState();
    setTimeout(nextRound, 2000);
  }

  // ---------- Events ----------
  // Desktop: mousedown.preventDefault verhindert Fokusverlust → Tastatur bleibt
  // iOS:     touchend.preventDefault triggert die Aktion direkt und unterdrückt
  //          den synthetischen Click (sonst doppelt) UND hält den Fokus.
  $btn.addEventListener('mousedown', e => e.preventDefault());
  $btn.addEventListener('click',     check);
  $btn.addEventListener('touchend', e => {
    e.preventDefault();
    check();
  }, { passive: false });

  // Eingabe hart auf Ziffern beschränken (Zusatzschutz)
  $answer.addEventListener('input', () => {
    $answer.value = $answer.value.replace(/[^0-9]/g, '');
  });

  // Enter/Return (PC-Tastatur, iOS „Go"/Haken-Button) → prüfen
  $answer.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      check();
    }
  });

  // ---------- Priorisierungs-Buttons ----------
  /** Spiegelt priority-State auf die Button-Optik (.active = gedrückt) */
  function updatePriorityUI() {
    document.querySelectorAll('.prio-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.type === priority);
    });
  }

  /** Toggle: gleicher Button erneut → deaktivieren; anderer → wechseln */
  function setPriority(t) {
    priority = (priority === t) ? null : t;
    updatePriorityUI();
    saveState();
  }

  document.querySelectorAll('.prio-btn').forEach(btn => {
    const fn = () => setPriority(btn.dataset.type);
    btn.addEventListener('mousedown', e => e.preventDefault());   // Fokus halten
    btn.addEventListener('click',     fn);
    btn.addEventListener('touchend', e => {                       // iOS zuverlässig
      e.preventDefault();
      fn();
    }, { passive: false });
  });

  // ---------- Reset-Button ----------
  /** Setzt die Statistik auf 0 (Priorität bleibt erhalten). Mit Sicherheitsabfrage. */
  function doReset() {
    if (!confirm('Statistik wirklich zurücksetzen?')) return;
    correct = 0;
    wrong   = 0;
    updateStats();
    saveState();
  }

  const $reset = document.getElementById('reset-btn');
  $reset.addEventListener('mousedown', e => e.preventDefault());
  $reset.addEventListener('click',     doReset);
  $reset.addEventListener('touchend', e => {
    e.preventDefault();
    doReset();
  }, { passive: false });

  // ---------- Start ----------
  loadState();
  updatePriorityUI();
  updateStats();
  nextRound();
})();
</script>
</body>
</html>
